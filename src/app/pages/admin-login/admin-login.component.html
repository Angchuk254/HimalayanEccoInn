<section class="page-hero hero-slim">
  <div class="container">
    <span class="eyebrow">Admin</span>
    <h1>Admin access login</h1>
    <p class="lead">Sign in to manage guest inquiries and requests.</p>
  </div>
</section>

<section class="section-spacing">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <form class="card admin-card" [formGroup]="loginForm" (ngSubmit)="submit()">
          <h4>Admin Login</h4>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" formControlName="email" />
            <small class="text-danger" *ngIf="submitted && loginForm.get('email')?.invalid">
              Enter a valid email address.
            </small>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" formControlName="password" />
            <small class="text-danger" *ngIf="submitted && loginForm.get('password')?.invalid">
              Password should be at least 6 characters.
            </small>
          </div>
          <button class="btn btn-primary w-100" [disabled]="isLoading" type="submit">
            {{ isLoading ? 'Signing in...' : 'Login' }}
          </button>
          <p class="text-danger mt-3 mb-0" *ngIf="errorMessage">{{ errorMessage }}</p>
        </form>
      </div>
    </div>
  </div>
</section>
